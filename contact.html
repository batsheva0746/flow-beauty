    <main>
        <h1 id="titleContact">דברו איתנו</h1>
        <form id="formContact">
            <div class="fillContact">
                <label for="fullname" class="TextContact">שם מלא:</label>
                <input id="fullname" type="text" placeholder="הקלידי שם מלא" required>
            </div>

            <div class="fillContact">
                <label for="email" class="TextContact">אימייל:</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>

            <div class="fillContact">
                <label for="phone" class="TextContact">טלפון:</label>
                <input type="tel" id="phone" placeholder="052-3456789" required>
            </div>

            <div class="fillContact">
                <label for="subject" class="TextContact">נושא הפנייה:</label>
                <select id="subject">
                    <option>הזמנה</option>
                    <option value="questions">שאלות</option>
                    <option value="feedback">משוב</option>
                    <option value="other">אחר</option>
                </select>
            </div>

            <div class="fillContact">
                <label class="TextContact">איך לחזור אליך?</label>
                <input type="radio" id="phone-opt" name="contactRadio">
                <label for="phone-opt" class="TextContact">טלפון</label>
                
                <input type="radio" id="email-opt" name="contactRadio">
                <label for="email-opt" class="TextContact">אימייל</label>
            </div>

            <div class="fillContact">
                <label for="massageContact" class="TextContact">תוכן הפנייה:</label>
                <textarea id="massageContact" required></textarea>
            </div>
            <button type="submit" id="submitContact">שליחה</button>
        </form>
    </main>
